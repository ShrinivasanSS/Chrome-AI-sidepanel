server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index api-test-page.html;

  location = / {
    try_files /api-test-page.html =404;
  }

  location /example-inputs/ {
    alias /opt/example-inputs/;
  }

  location = /api-test-page.html {
    try_files /api-test-page.html =404;
  }

  location / {
    try_files $uri $uri/ /api-test-page.html;
  }
}
