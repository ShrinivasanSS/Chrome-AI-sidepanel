server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location /vanilla/ {
    rewrite ^/vanilla/(.*)$ /$1 break;
    proxy_pass http://vanilla;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /vanilla;
  }

  location = /vanilla {
    return 301 /vanilla/;
  }

  location /jsp/ {
    rewrite ^/jsp/(.*)$ /$1 break;
    proxy_pass http://jsp:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /jsp;
  }

  location = /jsp {
    return 301 /jsp/;
  }
}
